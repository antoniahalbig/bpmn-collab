    <title>BPMN Editor</title>
    <style>
      /* Feature 1: comment badge hover effect */
      .comment-badge:hover {
        transform: scale(1.2);
        transition: transform 0.1s;
      }

      /* Feature 2: remote-change pulse animation */
      @keyframes remote-pulse {
        0%, 100% { stroke-opacity: 1; }
        50%       { stroke-opacity: 0.2; }
      }
      /* --highlight-color is set inline on the element's gfx by BpmnEditor,
         so each remote user's changes pulse in their own colour.
         Falls back to neutral blue when no colour is provided. */
      .remote-highlight .djs-visual > :is(rect, circle, polygon, path) {
        stroke: var(--highlight-color, #3498db) !important;
        stroke-width: 3px !important;
        animation: remote-pulse 0.5s ease-in-out 3;
      }
    </style>
